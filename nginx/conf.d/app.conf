upstream fastapi_backend {
    server backend:8000;
    keepalive 32;
}

upstream nextjs_frontend {
    server frontend:3000;
    keepalive 32;
}

# HTTP -> HTTPS
server {
    listen 80;
    server_name api.newposm.uz www.newposm.uz newposm.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# https://api.newposm.uz -> FastAPI backend
server {
    listen 443 ssl;
    server_name api.newposm.uz;

    ssl_certificate /etc/letsencrypt/live/newposm.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newposm.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # MinIO presigned URL downloads (bucket name = todo-files)
    location /todo-files/ {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    location / {
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# https://newposm.uz и https://www.newposm.uz -> Next.js frontend
server {
    listen 443 ssl;
    server_name newposm.uz www.newposm.uz;

    ssl_certificate /etc/letsencrypt/live/newposm.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newposm.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass http://nextjs_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
