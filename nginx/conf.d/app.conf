# =========================
# HTTP -> HTTPS redirect
# =========================
server {
    listen 80;

    server_name api.newposm.uz www.api.newposm.uz www.newposm.uz newposm.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================
# API (FastAPI)
# =========================
server {
    listen 443 ssl;

    server_name api.newposm.uz www.api.newposm.uz;

    ssl_certificate /etc/letsencrypt/live/newposm.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newposm.uz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        set $backend backend;
        proxy_pass http://$backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

# =========================
# FRONTEND (Next.js)
# =========================
server {
    listen 443 ssl;

    server_name newposm.uz www.newposm.uz;

    ssl_certificate /etc/letsencrypt/live/newposm.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newposm.uz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        set $frontend frontend;
        proxy_pass http://$frontend:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}